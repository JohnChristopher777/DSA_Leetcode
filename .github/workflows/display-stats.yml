name: Update README Stats

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *' 
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Update README Matrix
      run: |
        python -c "
        import json
        import re
        import os

        easy_cnt, medium_cnt, hard_cnt, total_cnt = 4, 1, 0, 5

        json_file = None
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.lower() in ['stat.json', 'stats.json']:
                    json_file = os.path.join(root, file)
                    break
            if json_file:
                break

        if json_file:
            try:
                with open(json_file, 'r') as f:
                    data = json.load(f)
                stats = data.get('leetcode', data)
                easy_cnt = stats.get('easy', stats.get('Easy', easy_cnt))
                medium_cnt = stats.get('medium', stats.get('Medium', medium_cnt))
                hard_cnt = stats.get('hard', stats.get('Hard', hard_cnt))
                total_cnt = stats.get('solved', stats.get('total', int(easy_cnt)+int(medium_cnt)+int(hard_cnt)))
            except Exception as e:
                print('Parser fallback initialized')

        # Modern UI Layout using Flat Vector Badges (No broken emojis or raw markdown table text)
        ui_card = '\n### LeetCode Progress\n\n'
        ui_card += '[![Easy](https://shields.io' + str(easy_cnt) + '-2db55d?style=for-the-badge&logoWidth=0)](https://leetcode.com)\n'
        ui_card += '[![Medium](https://shields.io' + str(medium_cnt) + '-ffb700?style=for-the-badge&logoWidth=0)](https://leetcode.com)\n'
        ui_card += '[![Hard](https://shields.io' + str(hard_cnt) + '-ef4743?style=for-the-badge&logoWidth=0)](https://leetcode.com)\n'
        ui_card += '[![Total](https://shields.io' + str(total_cnt) + '-4a90e2?style=for-the-badge&logoWidth=0)](https://leetcode.com)\n\n'

        with open('README.md', 'r') as f:
            readme = f.read()

        # Clean out old raw JSON remnants, duplicate tables, and broken question mark symbols
        readme = re.sub(r'\{\"leetcode\".*?\}\}\n*', '', readme, flags=re.DOTALL)
        readme = re.sub(r'', '', readme)

        pattern = r'(<!-- START_STATS -->)(.*?)(<!-- END_STATS -->)'
        if re.search(pattern, readme, re.DOTALL):
            new_readme = re.sub(pattern, r'\1\n' + ui_card + r'\3', readme, flags=re.DOTALL)
        else:
            target = '# LeetCode Topics'
            if target not in readme:
                target = '## LeetCode Topics'
            
            if target in readme:
                new_readme = readme.replace(target, '<!-- START_STATS -->\n' + ui_card + '<!-- END_STATS -->\n\n' + target)
            else:
                new_readme = readme + '\n\n<!-- START_STATS -->\n' + ui_card + '<!-- END_STATS -->'

        with open('README.md', 'w') as f:
            f.write(new_readme)
        "

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add README.md
        git diff-index --quiet HEAD || git commit -m "Update README stats [skip ci]"
        git push
