name: Update README Stats

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *' 
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Update README Matrix
      run: |
        python -c "
        import json
        import re
        import os

        easy_cnt, medium_cnt, hard_cnt, total_cnt = 4, 1, 0, 5

        json_file = None
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.lower() in ['stat.json', 'stats.json']:
                    json_file = os.path.join(root, file)
                    break
            if json_file:
                break

        if json_file:
            try:
                with open(json_file, 'r') as f:
                    data = json.load(f)
                stats = data.get('leetcode', data)
                easy_cnt = int(stats.get('easy', stats.get('Easy', easy_cnt)))
                medium_cnt = int(stats.get('medium', stats.get('Medium', medium_cnt)))
                hard_cnt = int(stats.get('hard', stats.get('Hard', hard_cnt)))
                total_cnt = int(stats.get('solved', stats.get('total', easy_cnt + medium_cnt + hard_cnt)))
            except Exception as e:
                print('Parser fallback initialized')

        # Modern Obsidian Callout blocks with custom names and line separators
        ui_card = '\n---\n\n### My LeetCode Progress \n\n'
        ui_card += '> [!tip]= Easy\n'
        ui_card += '> ' + str(easy_cnt) + ' problems solved\n\n'
        ui_card += '> [!warning]= Medium\n'
        ui_card += '> ' + str(medium_cnt) + ' problems solved\n\n'
        ui_card += '> [!danger]= Hard\n'
        ui_card += '> ' + str(hard_cnt) + ' problems solved\n\n'
        ui_card += '> [!note]= Total\n'
        ui_card += '> ' + str(total_cnt) + ' total problems solved\n\n'
        ui_card += '---\n\n'

        with open('README.md', 'r') as f:
            readme = f.read()

        # SAFE REPLACEMENT: Only changes the text inside the placeholder window
        pattern = r'(<!-- START_STATS -->)(.*?)(<!-- END_STATS -->)'
        if re.search(pattern, readme, re.DOTALL):
            new_readme = re.sub(pattern, r'\1\n' + ui_card + r'\3', readme, flags=re.DOTALL)
            print('Successfully updated Obsidian callouts inside placeholders.')
        else:
            print('Placeholders missing! Appending safely to prevent erasures.')
            new_readme = '<!-- START_STATS -->\n' + ui_card + '<!-- END_STATS -->\n\n' + readme

        with open('README.md', 'w') as f:
            f.write(new_readme)
        "

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add README.md
        git diff-index --quiet HEAD || git commit -m "Update README stats [skip ci]"
        git push
