name: Update README Stats

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *' 
  push:
    branches:
      - main # Change to 'master' if your default branch is master

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Update README Matrix
      run: |
        python -c "
        import json
        import re
        import os

        # Deep search for stat.json or stats.json
        json_file = None
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.lower() in ['stat.json', 'stats.json']:
                    json_file = os.path.join(root, file)
                    break
            if json_file:
                break

        if not json_file:
            print('Error: Could not find any stat.json or stats.json file!')
            exit(1)

        print(f'Found stats file at: {json_file}')

        # Read stats
        with open(json_file, 'r') as f:
            stats = json.load(f)

        # Map counts safely
        easy_cnt = stats.get('easy', stats.get('Easy', 0))
        medium_cnt = stats.get('medium', stats.get('Medium', 0))
        hard_cnt = stats.get('hard', stats.get('Hard', 0))
        
        total_cnt = stats.get('total', stats.get('Total', None))
        if total_cnt is None:
            total_cnt = int(easy_cnt) + int(medium_cnt) + int(hard_cnt)

        # Build a basic text block box with your 2 question marks style
        stats_box = '```text\n'
        stats_box += '[ LeetCode Progress ]\n'
        stats_box += f'Easy:   {easy_cnt}\n'
        stats_box += f'Medium: {medium_cnt}\n'
        stats_box += f'Hard:   {hard_cnt}\n'
        stats_box += f'Total:  {total_cnt} ??\n'
        stats_box += '```\n'

        # Read current README contents
        with open('README.md', 'r') as f:
            readme = f.read()

        # Remove old tags if they exist anywhere else in the document
        readme = re.sub(r'<!-- START_STATS -->.*?<!-- END_STATS -->', '', readme, flags=re.DOTALL)

        # Dynamically place the tags and box right above the LeetCode Topics header
        target_header = '## LeetCode Topics'
        if target_header not in readme:
            # Fallback if case-sensitivity or formatting is slightly different
            target_header = '# LeetCode Topics'

        if target_header in readme:
            replacement_block = f'<!-- START_STATS -->\n{stats_box}<!-- END_STATS -->\n\n{target_header}'
            new_readme = readme.replace(target_header, replacement_block)
        else:
            # Absolute fallback if header isn't found: Append at bottom
            print('Warning: LeetCode Topics header not found. Appending to bottom.')
            new_readme = readme + '\n\n<!-- START_STATS -->\n' + stats_box + '<!-- END_STATS -->'

        with open('README.md', 'w') as f:
            f.write(new_readme)
        "

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        git diff-index --quiet HEAD || git commit -m "Update README stats [skip ci]"
        git push
