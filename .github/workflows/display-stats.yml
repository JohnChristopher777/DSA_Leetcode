name: Update README Stats

on:
  workflow_dispatch: # Allows you to manually click a button to run it instantly
  schedule:
    - cron: '0 * * * *' # Automatically runs every hour to sync your LeetHub updates
  push:
    branches:
      - main # Change to 'master' if your default branch is master

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Update README Matrix
      run: |
        python -c "
        import json
        import re
        import os

        # Find the JSON file dynamically (handles lowercase/uppercase names)
        json_file = None
        for file in os.listdir('.'):
            if file.lower() == 'stat.json':
                json_file = file
                break

        if not json_file:
            print('Error: Could not find stat.json file!')
            exit(1)

        # Read stats
        with open(json_file, 'r') as f:
            stats = json.load(f)

        # Format stats into a markdown table with Colored Text
        table = '### LeetCode Progress\n\n'
        table += '| Difficulty | Solved |\n| --- | --- |\n'
        table += f'| <span style=\"color:#2db55d\">**Easy**</span> | {stats.get(\'easy\', 0)} |\n'
        table += f'| <span style=\"color:#ffb700\">**Medium**</span> | {stats.get(\'medium\', 0)} |\n'
        table += f'| <span style=\"color:#ef4743\">**Hard**</span> | {stats.get(\'hard\', 0)} |\n'
        table += f'| **Total** | **{stats.get(\'total\', 0)}** |\n\n'

        # Read README
        with open('README.md', 'r') as f:
            readme = f.read()

        # Replace text between placeholders
        pattern = r'(<!-- START_STATS -->)(.*?)(<!-- END_STATS -->)'
        replacement = f'\\1\n{table}\\3'
        
        if re.search(pattern, readme, re.DOTALL):
            new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)
        else:
            new_readme = readme + '\n' + replacement

        with open('README.md', 'w') as f:
            f.write(new_readme)
        "

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        git diff-index --quiet HEAD || git commit -m "Update README stats [skip ci]"
        git push
