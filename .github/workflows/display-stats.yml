name: Update README Stats

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *' 
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Update README Matrix
      run: |
        python -c "
        import json
        import re
        import os

        # Hardcoded fallback values from your actual repository data string
        easy_cnt, medium_cnt, hard_cnt, total_cnt = 4, 1, 0, 5

        # Check for dynamic updates inside stats.json
        json_file = None
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file.lower() in ['stat.json', 'stats.json']:
                    json_file = os.path.join(root, file)
                    break
            if json_file:
                break

               if json_file:
            try:
                with open(json_file, 'r') as f:
                    data = json.load(f)
                stats = data.get('leetcode', data)
                easy_cnt = stats.get('easy', stats.get('Easy', easy_cnt))
                medium_cnt = stats.get('medium', stats.get('Medium', medium_cnt))
                hard_cnt = stats.get('hard', stats.get('Hard', hard_cnt))
                total_cnt = stats.get('solved', stats.get('total', int(easy_cnt)+int(medium_cnt)+int(hard_cnt)))
            except Exception as e:
                print(f'Fallback parser triggered: {e}')

        # Create a modern, visually striking GitHub card using a clean table layout
        ui_card = '\n### LeetCode Stats\n\n'
        ui_card += '| Difficulty | Solved Status |\n'
        ui_card += '| :--- | :--- |\n'
        ui_card += f'| <span style=\"color:#2db55d\">**Easy**</span> | **{easy_cnt}** |\n'
        ui_card += f'| <span style=\"color:#ffb700\">**Medium**</span> | **{medium_cnt}** |\n'
        ui_card += f'| <span style=\"color:#ef4743\">**Hard**</span> | **{hard_cnt}** |\n'
        ui_card += f'| ? **Total** ? | **{total_cnt}** |\n\n'

        # Read README content
        with open('README.md', 'r') as f:
            readme = f.read()

        # Safely substitute data right inside your exact tags, regardless of where they are positioned
        pattern = r'(<!-- START_STATS -->)(.*?)(<!-- END_STATS -->)'
        if re.search(pattern, readme, re.DOTALL):
            new_readme = re.sub(pattern, f'\\1\n{ui_card}\\3', readme, flags=re.DOTALL)
            print('Successfully updated the stats block layout.')
        else:
            # If tags are completely missing, auto-append above the Topics Header cleanly
            print('Tags missing, finding structural headers.')
            target = '# LeetCode Topics'
            if target not in readme:
                target = '## LeetCode Topics'
            
            if target in readme:
                new_readme = readme.replace(target, f'<!-- START_STATS -->\n{ui_card}<!-- END_STATS -->\n\n{target}')
            else:
                new_readme = readme + f'\n\n<!-- START_STATS -->\n{ui_card}<!-- END_STATS -->'

        with open('README.md', 'w') as f:
            f.write(new_readme)
        "

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        git diff-index --quiet HEAD || git commit -m "Update README stats [skip ci]"
        git push
